---
- name: Atualiza repositórios apt
  ansible.builtin.apt:
    update_cache: true

- name: Mostra distribuição do servidor
  ansible.builtin.debug:
    msg: "{{ ansible_distribution_release }}"

- name: Instala dependências para Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present

- name: Cria diretório para keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Baixa e converte chave GPG oficial do Docker
  block:
    - name: Baixa chave ASCII do Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Converte chave ASCII para keyring GPG
      ansible.builtin.command:
        cmd: gpg --dearmor --yes --output /etc/apt/keyrings/docker.gpg /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

- name: Ajusta permissões da chave Docker
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    owner: root
    group: root
    mode: "0644"

- name: Adiciona repositório oficial do Docker
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present

- name: Atualiza cache do apt após adicionar repo Docker
  ansible.builtin.apt:
    update_cache: true

- name: Instala Docker Engine e Docker Compose V2
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Inicia e habilita serviço Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
