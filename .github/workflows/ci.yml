name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11" "ansible-lint>=24,<25"

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: ansible-lint
        run: ansible-lint .

      - name: syntax check
        run: |
          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          mkdir -p "$TMP_DIR/roles/setup-dca"
          cp -R defaults meta tasks README.md requirements.yml "$TMP_DIR/roles/setup-dca/"

          cat > "$TMP_DIR/playbook.yml" <<'EOF'
          ---
          - name: Validate role
            hosts: localhost
            connection: local
            gather_facts: true
            roles:
              - setup-dca
          EOF

          cat > "$TMP_DIR/inventory.ini" <<'EOF'
          [local]
          localhost ansible_connection=local
          EOF

          ANSIBLE_ROLES_PATH="$TMP_DIR/roles" ansible-playbook -i "$TMP_DIR/inventory.ini" "$TMP_DIR/playbook.yml" --syntax-check
