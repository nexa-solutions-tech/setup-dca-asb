name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11" "ansible-lint>=24,<25"

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Validate
        run: |
          ansible-lint .

          TMP_DIR=$(mktemp -d)
          trap 'rm -rf "$TMP_DIR"' EXIT

          mkdir -p "$TMP_DIR/roles/setup-dca"
          cp -R defaults meta tasks README.md requirements.yml "$TMP_DIR/roles/setup-dca/"

          cat > "$TMP_DIR/playbook.yml" <<'EOF'
          ---
          - name: Validate role
            hosts: localhost
            connection: local
            gather_facts: true
            roles:
              - setup-dca
          EOF

          cat > "$TMP_DIR/inventory.ini" <<'EOF'
          [local]
          localhost ansible_connection=local
          EOF

          ANSIBLE_ROLES_PATH="$TMP_DIR/roles" ansible-playbook -i "$TMP_DIR/inventory.ini" "$TMP_DIR/playbook.yml" --syntax-check

      - name: Build changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          CURRENT_TAG="${{ github.ref_name }}"

          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s (%h)" "$CURRENT_TAG" > /tmp/changelog.txt
          else
            git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..$CURRENT_TAG" > /tmp/changelog.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: /tmp/changelog.txt
          draft: false
          prerelease: false
